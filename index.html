<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新月集 - 心得與評論</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a3318; font-family: "PingFang TC", "STKaiti", serif; }
        
        #header { position: absolute; top: 25px; left: 30px; z-index: 10; color: white; pointer-events: none; }
        h1 { font-weight: 300; letter-spacing: 5px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #signature { position: absolute; bottom: 20px; right: 25px; color: rgba(255,255,255,0.4); font-size: 0.8rem; z-index: 10; }

        /* 模擬 image_5f5b30.png 的舊紙張樣式 */

            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center;
            z-index: 100; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px);
        }

        #old-paper {
            width: 85%; max-width: 650px; height: 85vh;
            background: #f4efdf; position: relative;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            clip-path: polygon(
                2% 2%, 15% 0%, 35% 2%, 55% 0%, 75% 3%, 98% 1%, 
                100% 20%, 97% 45%, 100% 75%, 98% 98%, 
                75% 97%, 50% 100%, 25% 98%, 2% 99%, 
                0% 75%, 3% 50%, 0% 25%
            );
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0%, transparent 80%),
                linear-gradient(135deg, transparent 45%, rgba(0,0,0,0.05) 50%, transparent 55%);
            transform: rotate(0.5deg);
        }

        #paper-content {
            flex: 1; padding: 60px 40px; overflow-y: auto; z-index: 1;
            scrollbar-width: thin; scrollbar-color: #8b4513 transparent;
        }

        #comment-title { 
            color: #4a3728; font-size: 1.6rem; margin-bottom: 20px; font-weight: bold; 
            border-bottom: 2px solid rgba(139, 69, 19, 0.2); padding-bottom: 15px; 
            text-align: center; font-family: "STKaiti", serif;
        }
        #comment-text { 
            color: #3e2723; line-height: 2.2; white-space: pre-wrap;

        }
        
        #close-btn {
            background: rgba(139, 69, 19, 0.8); color: white; padding: 18px; 
            text-align: center; cursor: pointer; border: none; font-size: 1rem;

        }
        #close-btn:hover { background: #5d4037; }
    </style>
</head>
<body>

    <div id="header">
        <h1>新月集</h1>
        <div style="opacity: 0.7;">心得與評論</div>
    </div>

    <div id="signature">作者：吳則燁</div>

    <div id="paper-overlay">
        <div id="old-paper">
            <div id="paper-content">
                <div id="comment-title"></div>
                <div id="comment-text"></div>
            </div>
            <button id="close-btn" onclick="closeOverlay()">讓紙船繼續漂流</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script>
        let boats = [];
        let flowers = [];
        let sparkles = [];
        let grassPatches = [];
        
        const fullComments = [
            { title: "1. 〈家庭〉", content: `這篇以旁觀者的視角去描寫日暮時分孩子回家的景象，陽光收拾而去，逐漸冷卻的大地是如何和諧。\n\n只不過，我有比較在意的地方，第一次閱讀我以為這個角度僅僅是寫下所見，並沒有過多留意文中的「我」，反而是被男孩一詞攫獲注意，男孩尖銳的歌聲，或許是玩太晚忽然驚覺置身黑夜，又擔心回家後面臨責備而高歌壯膽，也有可能，他單純玩的盡興，又想到餐桌上熱騰騰的菜餚而滿足的歌唱，無論如何，從「我」的角度來說，這顯然是令人羨慕而對方卻渾然不自知這種隨處可見的幸福。\n\n所以我好奇「我」到底是怎麼樣的存在？第二次閱讀時，我把「我」當成眾多被男孩涵蓋或舉例的小孩之一，卻發現不同，「我」細緻的觀察男孩的動向，描述了男孩的家，卻沒寫「我」要去哪，從第一句以及最後一段開頭：「我獨自橫跨......」、「我在星空下獨自走著......」了解到「我」是沒有歸處的，於是哀嘆回家的男孩與守望的母親，皆不知這種普通的得來不易，不知道它的價值。\n\n這篇我認為是從某個失去依靠的孩子的角度出發，描寫男孩的步伐不假思索走回家，自己卻只能短暫停留星光下，旋即又要出發的戒慎，以一人去面對黑沉沉的大地，沒有等著他的人，也沒有燈，〈家庭〉這標題將主視角排除在外，就像太陽將他留在黑夜中。` },
            { title: "2. 〈海邊〉", content: `粗暴的總結一下這首詩，世界之大，孩子卻只願嬉戲而非圖利，有別於濫採自然資源的大人，泰戈爾所寫「採珠的人為了珠潛水，商人在他們的船上航行，孩子們卻只把小圓石聚了又散。他們不搜求寶藏，他們不知道怎麼撒網。」可以見得，孩子們所做所為都只是為了快樂，而不是販售珍珠或魚，因為他們不知道怎麼撒網。\n\n除了透過對比描寫孩子的質樸單純，泰戈爾反覆使用「孩子們在無邊無際的世界的海邊。」卻只是聚集在海邊一隅，相反的，大人們卻拼命往海外跑，渾然不知自己即將面對危險，大海一邊為孩子們唱著搖籃曲，一邊為那些貪婪的大人準備著死，這首詩在後半寫道沉碎、狂風暴雨的死的隱喻，卻「無轍跡」，所以孩子們不會看見致人死命的波濤，他們依然專注在堆沙堡。\n\n某種意義上來說，這些孩子才是成熟的，他們無知，所以知止，停留在海邊，不對海水做過多的涉足，他們知道真正的寶藏在自己的手中。[cite: 2]` },
            { title: "3. 〈來源〉", content: `這篇透過孩子的睡眠、微笑、新鮮生氣，反向描寫母親，第一段有句讀來很詭異的句子，我嘗試理解後，解讀出了一些可能，原句：「是的，有個謠傳，說它是住在螢火蟲朦朧的照著的林蔭裡的仙村裡，在那個地方，掛著兩個迷人的羞怯的蓓蕾。」坦白說我的思緒在這邊跟不上視線了，不知是譯文拗口，還是原文如此。\n\n後來我想到，如果孩子也包含嬰兒，那麼仙村就可以解釋為母親的懷抱，蓓蕾就是女性性徵，後面寫道：「它就是從那個地方來吻孩子的兩眼的。」就不單純是睡眠，也包含母性帶來的安穩。孩子睡時的微笑，則是即將離去的新月，並且帶著這彎新月迎接早晨與露水，不受威脅就是整夜的守護，而浸浴露水的早晨或許是母親在哺乳。\n\n最後「甜蜜柔嫩的新鮮生氣」潛伏而綻放，源自母親少女時的心中，那份愛的溫柔與神秘，有意思的是，少女長大成為母親，她的新鮮生氣卻保留給了懷中的孩子，除了顯著的溫柔，愛的神秘或許就是「愛」本身的傳承，母親也曾在懷中安穩的睡著。[cite: 2]` },
            { title: "4. 〈孩童之道〉", content: `孩童放棄一切，就為來到媽媽身邊。我自己用一句話作結，筆下的想像，寫出孩童原本在一個自由，有無盡財寶的樂土，自己也能說出很多聰明話，張翅騰飛，但是為了獲得媽媽的憐愛，他們放棄了所有，化作乞丐墜落，如此脆弱，自然不能離開母親的保護，一切都需要重新開始。\n\n這篇最有趣的地方莫過於孩子選擇了父母，我們或許常常聽到，或抱怨無法選擇自己的親生父母，在泰戈爾筆下，孩子才是那個甘願放棄一切來到母親懷中的天使/乞丐。\n\n他不需要真理，只需要聽懂媽媽在說什麼；學會了哭泣，就能得到媽媽的安哄；黃金與珠子，都比不上母愛的誠摯與慷慨；這場買賣，孩子只需要微笑，母親便滿足了，泰戈爾於是稱作「雙重約束的帶子」，可能是抽象的比喻，一種難以抹滅、互相選擇的關係，或者是臍帶—————最最根本的母子連結。[cite: 2]` },
            { title: "5. 〈不被注意的花飾〉", content: `首先我注意到的是視角轉換，文中「我的孩子」以及「我的小小的命芽兒」，讓我下意識的以為是母親，可後文寫在「媽媽」一詞之後的動作，卻是用「她」這個第三人稱代名詞，也就是說對孩子玩鬧而歡喜的「我」，既是孩子的直系親屬，又不是母親，那麼是否有可能是父親呢？\n\n前幾段描述孩子的玩鬧以及母親在近處守望，文中又以乞丐稱呼孩子，其實是很有趣的想像；比較抽象的是最後兩段，反覆的句子「風高興的帶走了你踝鈴的叮 」以及「仙鄉裡的夢婆飛過朦朧的天空，向你飛來」，可以是很直觀的風吹鈴響以及做夢，可如果連結〈來源〉，仙鄉或許就是仙村，是母親的懷抱。\n\n比較難以理解的是倒數第二句：「他，向星星奏樂的人，正拿著他的橫笛，站在你的窗邊。」這個他顯然不是講述者，他是一個意象。最後，什麼是花飾？被忽略的花飾，是太陽留給孩子的曬痕，是曬痕體現出來的「生氣」。[cite: 2]` },
            { title: "6. 〈偷睡眠者〉", content: `本篇寫孩子玩鬧後小憩，母親藉機去汲水，回來卻發現孩子提前醒過來，於是猜想著是否孩子的睡眠被偷走了，勢必要奪回來。\n\n時間是正午，並沒有讀出想像中的炎熱，牧童在樹下歇息、鴨子在水中而不泛起漣漪、或白鶴靜立，都讓整篇文章的溫度冷卻不少，後面對於「偷睡眠者」的想像更是有如墜入童話，傳聞印度的醉花一聞即醉，醉花林濃厚而朦朧的香氣與睡意，或許便是偷睡眠者積放贓物所致。\n\n文章後面，母親陪在孩子身邊，充盈的安全感讓孩子可以放心睡著，自然不會有可乘之機，又或是母親陪著孩子一起睡著，去那醉花林中尋找失竊的睡眠了。[cite: 2]` },
            { title: "7. 〈開始〉", content: `孩子好奇的探求自己的存在，母親則以自己的生命成長經驗作為回答。孩子曾是心願，一個遙遠的、不確定能否實現的心願，在另一個孩子的心中孕育著；祭拜家庭守護神，也被當作是對孩子的虔誠，孩子就是來保護這個家庭的神明輕輕墜落到人間。\n\n孩子早就存在於母親的愛情與希望之中，而母親，也早就在她母親的愛情與希望中孕育，一對孩子與母親，不是單向傳承，而是幾近無限的長線中被他們證明的其中一段。\n\n母親少女時，心中的花一開，孩子就像花香一樣遲早會到來；又如太陽出現前的曙光，母親或許就是孩子的預兆。凝視著孩子的母親彷彿獲得世間渡讓的珍寶，她緊緊抱著，由衷感謝孩子的到來，我為泰戈爾用各種抽象句子展現母愛的技術感到不可思議和佩服。[cite: 2]` },
            { title: "8. 〈孩子的世界〉", content: `孩子的到來不只是讓母親感到驚喜，這份喜悅將會是所有見證者共享，星星守著他的夢，天空布置雲朵彩虹，長大的孩子們面對新來的同伴也表現出同等熱情。有趣的是母親反而吃醋了，她覺得自己的愛不特別了。\n\n在這個孩子心中的小世界裡，可以暫且退還理智，不去計較事實，一切都是剛誕生而未成形的無限可能當中，母親悄悄的寄放了一個願望，是她對孩子的佔有慾，是兩個孩子的私心和任性。[cite: 2]` },
            { title: "9. 〈時候與原因〉", content: `一位母親藉由和孩子同樂重新認識這個世界的美好。當她唱歌，音律流轉，孩子乘歌起舞，步伐彷彿喚醒了大地的心跳，樹葉也飄出聲調，海浪合唱，在母親的眼裡，或許以孩子為中心開始了一場盛大的演出。\n\n糖果的甜味，討孩子歡心，孩子喜歡，所以一切甜蜜都有了意義。母親的親吻不只是愛意的體現，是種安全的象徵，母親就在觸手可及的地方，所以她也像孩子一樣，向孩子所求回應：「笑一個。」孩子的笑容就像是晨光捎來初動的活力。這同時是原因，孩子的索求就是與世界的聯繫，也是她與世界的再次聯繫。[cite: 2]` },
            { title: "10. 〈責備〉", content: `在母親眼中，孩子的表現往往是純粹的，她能夠輕易找到最可愛的角度去詮釋行為的原因，並不像其他人將行為當作評判標準。\n\n孩子寫字時墨水沾上臉和手，而被責備，然而母親看著孩子骯髒的臉，只想到圓圓的月亮，帶點黑夜的雲朵；嬉鬧時勾破的衣服，也像殘破雲衣中展露笑容的秋陽，那樣不受拘束，自由而充滿生機。本來是孩子有求於母親，變成母親主動獻給孩子，孩子求的是糖果，母親給出去的卻飽含愛，這是能夠將責備化為寵溺的魔力。[cite: 2]` }
        ];

        function setup() {
            createCanvas(windowWidth, windowHeight);
            for(let i=0; i<150; i++) grassPatches.push(new GrassPatch());
            for(let i=0; i<400; i++) flowers.push(new Flower());
            for(let i=0; i<60; i++) sparkles.push(new Sparkle());
            let colors = ['#f44336','#ff9800','#ffeb3b','#4caf50','#00bcd4','#2196f3','#9c27b0','#ffffff','#fce4ec','#c8e6c9'];
            for(let i=0; i<10; i++) boats.push(new Boat(i, colors[i]));
        }

        function draw() {
            background(25, 55, 20);
            for(let p of grassPatches) p.show();
            for(let f of flowers) f.show();
            drawRiver();
            for(let s of sparkles) s.update();
            for(let b of boats) { b.update(); b.show(); }
        }

        class GrassPatch {
            constructor() {
                this.x = random(width); this.y = random(height);
                this.size = random(80, 220);
                let g = random(100, 180);
                this.color = color(random(40, 80), g, random(30, 70), 150);
                this.points = [];
                for(let a=0; a<TWO_PI; a+=0.5) {
                    let r = this.size * (0.8 + noise(this.x, this.y, a)*0.4);
                    this.points.push(createVector(cos(a)*r, sin(a)*r));
                }
            }
            show() {
                push(); translate(this.x, this.y); noStroke(); fill(this.color);
                beginShape();
                for(let p of this.points) vertex(p.x, p.y);
                endShape(CLOSE);
                pop();
            }
        }

        function getRiverX(y) {
            let nY = y / height;
            return width * 0.65 - (nY * width * 0.45) + sin(nY * PI * 1.3) * (width * 0.2);
        }

        function drawRiver() {
            let rW = width * 0.22;
            noStroke();
            for(let i=3; i>=0; i--) {
                fill(30, 100 + i*25, 200 + i*15, 160);
                beginShape();
                for(let y=0; y<=height; y+=20) vertex(getRiverX(y) - (rW/2 - i*12), y);
                for(let y=height; y>=0; y-=20) vertex(getRiverX(y) + (rW/2 - i*12), y);
                endShape(CLOSE);
            }
        }

        class Flower {
            constructor() {
                this.x = random(width); this.y = random(height);
                this.type = floor(random(5)); 
                this.scale = random(0.6, 1.1);
            }
            show() {
                let rx = getRiverX(this.y);
                if(abs(this.x - rx) < width * 0.12) return;
                push(); translate(this.x, this.y); scale(this.scale); noStroke();
                if(this.type === 0) { // 6瓣百合
                    fill(255, 255, 245);
                    for(let i=0; i<6; i++) { rotate(PI/3); ellipse(0, 6, 4, 15); }
                    fill(255, 210, 0); circle(0,0,2);
                } else if(this.type === 2) { // 薰衣草細節
                    fill(70, 130, 70); rect(-0.8, 0, 1.6, 16);
                    fill(150, 100, 240);
                    for(let i=0; i<7; i++) {
                        ellipse(-2.5, -i*3, 3.5, 4.5); ellipse(2.5, -i*3, 3.5, 4.5);
                        fill(70, 30, 140); circle(0, -i*3, 2); fill(150, 100, 240);
                    }
                } else if(this.type === 4) { // 勿忘我
                    fill(110, 190, 255);
                    for(let i=0; i<5; i++) { rotate(TWO_PI/5); ellipse(0, 4, 6, 7); }
                    fill(255, 255, 0); circle(0,0,3);
                } else if(this.type === 1) { // 紫羅蘭
                    fill(130, 70, 230);
                    for(let i=0; i<5; i++) { rotate(TWO_PI/5); circle(4.5, 0, 8); }
                    fill(255, 255, 120); circle(0,0,2);
                } else { // 牡丹
                    fill(255, 140, 180);
                    for(let i=0; i<12; i++) { rotate(PI/6); ellipse(6, 0, 13, 8); }
                    fill(255, 240, 100); circle(0,0,4);
                }
                pop();
            }
        }

        class Sparkle {
            constructor() { this.reset(); }
            reset() {
                this.y = random(height);
                this.x = getRiverX(this.y) + random(-width*0.08, width*0.08);
                this.alpha = random(100, 255);
            }
            update() {
                this.alpha -= 1.5;
                if(this.alpha <= 0) this.reset();
                fill(255, this.alpha); noStroke();
                circle(this.x, this.y, random(1, 3));
            }
        }

        class Boat {
            constructor(index, col) {
                this.index = index; this.color = col;
                this.progress = random(-1, 0); this.speed = 0.00055;
                this.off = random(-35, 35);
            }
            update() {
                this.progress += this.speed;
                if(this.progress > 1.1) this.progress = -0.1;
                this.y = this.progress * height;
                this.x = getRiverX(this.y) + this.off;
            }
            show() {
                if(this.y < 0 || this.y > height) return;
                push(); translate(this.x, this.y); rotate(sin(frameCount*0.02 + this.index)*0.12);
                fill(this.color); stroke(0, 60); strokeWeight(1);
                beginShape(); vertex(-22, 0); vertex(22, 0); vertex(14, 12); vertex(-14, 12); endShape(CLOSE);
                fill(lerpColor(color(this.color), color(255), 0.4));
                beginShape(); vertex(-6, 0); vertex(0, -25); vertex(12, 0); endShape(CLOSE);
                stroke(0, 40); line(0, -25, 0, 12);
                pop();
            }
            isClicked(mx, my) { return dist(mx, my, this.x, this.y) < 45; }
        }

        function mousePressed() {
            for(let b of boats) { if(b.isClicked(mouseX, mouseY)) { showOldPaper(b.index); return; } }
        }

        function showOldPaper(index) {
            const data = fullComments[index];
            document.getElementById('comment-title').innerText = data.title;
            document.getElementById('comment-text').innerText = data.content;
            document.getElementById('paper-overlay').style.display = 'flex';
        }

        function closeOverlay() { document.getElementById('paper-overlay').style.display = 'none'; }
        function windowResized() { resizeCanvas(windowWidth, windowHeight); }
    </script>
</body>
</html>
